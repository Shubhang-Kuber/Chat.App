<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cockpit Interstellar Chat</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="space-viewport" id="universe"></div>

<h1>Websockets Chat Messaging</h1>
<div id="messages"></div>
<div id="input-container">
    <input type="text" id="messageInput" placeholder="Broadcast transmission vectors...">
    <button id="sendButton">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const sendButton = document.getElementById('sendButton');
    const messageInput = document.getElementById('messageInput');
    const allMessagesDiv = document.getElementById('messages');
    const universe = document.getElementById('universe');

    function launchStarfield() {
        const STAR_COUNT = 40;
        for (let i = 0; i < STAR_COUNT; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = 1 + Math.random() * 1.5;
            star.style.setProperty('--x', `${Math.random() * 100}vw`);
            star.style.setProperty('--y', `${Math.random() * 100}vh`);
            star.style.setProperty('--size', `${size}px`);
            star.style.setProperty('--halo', `${2 + Math.random() * 4}px`);
            star.style.setProperty('--twinkle-dur', `${8 + Math.random() * 12}s`);
            star.style.setProperty('--drift-dur', `${30 + Math.random() * 40}s`);
            star.style.setProperty('--drift-x', `${(Math.random() - 0.5) * 60}px`);
            star.style.setProperty('--drift-y', `${(Math.random() - 0.5) * 60}px`);
            star.style.setProperty('--delay', `${Math.random() * -20}s`);
            universe.appendChild(star);
        }
    }
    launchStarfield();

    function sendMessage() {
        const message = messageInput.value;
        if (message.trim() !== '') {
            socket.emit('chatMessage', message);
            appendMessage(message, 'sent');
            messageInput.value = '';
        }
    }

    function appendMessage(message, type) {
        const messageContainer = document.createElement('div');
        messageContainer.classList.add('message-container', type);

        const messageElement = document.createElement('div');
        messageElement.classList.add('message', type);
        messageElement.textContent = message;

        const time = document.createElement('div');
        time.classList.add('timestamp');
        time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        messageContainer.appendChild(messageElement);
        messageContainer.appendChild(time);
        allMessagesDiv.appendChild(messageContainer);
        allMessagesDiv.scrollTop = allMessagesDiv.scrollHeight;
    }

    socket.on('message', (message) => {
        appendMessage(message, 'received');
    });

    sendButton.addEventListener('click', sendMessage);

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>
</body>
</html>
